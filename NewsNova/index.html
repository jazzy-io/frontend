            }

            function closeArticleModal() {
                DOM.modalOverlay.classList.remove('open');
                DOM.modalOverlay.setAttribute('aria-hidden', 'true');
                document.body.style.overflow = '';
                State.currentModalArticle = null;
            }

            function toggleBookmarkFromModal() {
                if (!State.currentModalArticle) return;
                const added = BookmarkManager.toggle(State.currentModalArticle);
                BookmarkManager.updateBadge();
                const isBm = BookmarkManager.isBookmarked(State.currentModalArticle);
                DOM.modalBookmarkBtn.classList.toggle('bookmarked', isBm);
                DOM.modalBookmarkBtn.innerHTML = isBm ? '⭐ Bookmarked' : '🔖 Bookmark';
                refreshVisibleBookmarkIcons();
                showToast(added ? 'Article bookmarked! ⭐' : 'Bookmark removed', added ? '⭐' : '🗑️');
                Renderer.renderBookmarksList();
            }

            function refreshVisibleBookmarkIcons() {
                document.querySelectorAll('.article-card__bookmark-btn').forEach((btn) => {
                    const card = btn.closest('.article-card');
                    if (!card || !card.dataset.articleData) return;
                    try {
                        const data = JSON.parse(card.dataset.articleData);
                        const isBm = BookmarkManager.isBookmarked(data);
                        btn.classList.toggle('bookmarked', isBm);
                        btn.innerHTML = isBm ? '⭐' : '☆';
                        btn.setAttribute('aria-label', isBm ? 'Remove bookmark' : 'Bookmark this article');
                    } catch { /* ignore */ }
                });
            }

            // ──────────────────────────────────────────────
            // BOOKMARKS PANEL
            // ──────────────────────────────────────────────
            function openBookmarksPanel() {
                Renderer.renderBookmarksList();
                DOM.bookmarksPanel.classList.add('open');
                DOM.bookmarksOverlay.classList.add('open');
                DOM.bookmarksOverlay.setAttribute('aria-hidden', 'false');
                document.body.style.overflow = 'hidden';
                DOM.bookmarksClose.focus();
            }

            function closeBookmarksPanel() {
                DOM.bookmarksPanel.classList.remove('open');
                DOM.bookmarksOverlay.classList.remove('open');
                DOM.bookmarksOverlay.setAttribute('aria-hidden', 'true');
                document.body.style.overflow = '';
            }

            // ──────────────────────────────────────────────
            // EVENT DELEGATION
            // ──────────────────────────────────────────────
            function setupGlobalEventDelegation() {
                // Article card clicks → open modal
                DOM.articleGrid.addEventListener('click', (e) => {
                    const card = e.target.closest('.article-card');
                    if (!card) return;

                    // If clicking bookmark button, handle separately
                    if (e.target.closest('[data-action="bookmark-toggle"]')) {
                        e.stopPropagation();
                        const btn = e.target.closest('[data-action="bookmark-toggle"]');
                        try {
                            const data = JSON.parse(card.dataset.articleData);
                            const added = BookmarkManager.toggle(data);
                            BookmarkManager.updateBadge();
                            btn.classList.toggle('bookmarked', BookmarkManager.isBookmarked(data));
                            btn.innerHTML = BookmarkManager.isBookmarked(data) ? '⭐' : '☆';
                            btn.setAttribute('aria-label', BookmarkManager.isBookmarked(data) ?
                                'Remove bookmark' : 'Bookmark this article');
                            showToast(added ? 'Article bookmarked! ⭐' : 'Bookmark removed', added ? '⭐' :
                                '🗑️');
                            Renderer.renderBookmarksList();
                        } catch { /* ignore */ }
                        return;
                    }

                    // Open modal
                    try {
                        const data = JSON.parse(card.dataset.articleData);
                        openArticleModal(data);
                    } catch { /* ignore */ }
                });

                // Keyboard support for article cards
                DOM.articleGrid.addEventListener('keydown', (e) => {
                    const card = e.target.closest('.article-card');
                    if (!card) return;
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        try {
                            const data = JSON.parse(card.dataset.articleData);
                            openArticleModal(data);
                        } catch { /* ignore */ }
                    }
                });

                // Bookmark items in panel use event delegation on the list
                DOM.bookmarksList.addEventListener('click', (e) => {
                    const removeBtn = e.target.closest('[data-action="remove-bookmark"]');
                    if (removeBtn) {
                        e.stopPropagation();
                        const url = removeBtn.dataset.url;
                        BookmarkManager.toggle({ url });
                        BookmarkManager.updateBadge();
                        Renderer.renderBookmarksList();
                        refreshVisibleBookmarkIcons();
                        showToast('Bookmark removed', '🗑️');
                        return;
                    }
                    const item = e.target.closest('.bookmark-item');
                    if (item) {
                        // handled by inline click listener
                    }
                });
            }

            // ──────────────────────────────────────────────
            // INITIALIZATION
            // ──────────────────────────────────────────────
            function init() {
                // Set footer year
                DOM.footerYear.textContent = new Date().getFullYear();

                // Load theme
                ThemeManager.init();

                // Load bookmarks
                BookmarkManager.load();
                BookmarkManager.updateBadge();

                // Render category navigation
                Renderer.renderCategoryNav();

                // Setup infinite scroll observer
                scrollObserver.observe(DOM.scrollSentinel);

                // Setup event delegation
                setupGlobalEventDelegation();

                // Event listeners
                DOM.btnThemeToggle.addEventListener('click', () => ThemeManager.toggle());
                DOM.btnBookmarksPanel.addEventListener('click', () => openBookmarksPanel());
                DOM.bookmarksClose.addEventListener('click', () => closeBookmarksPanel());
                DOM.bookmarksOverlay.addEventListener('click', () => closeBookmarksPanel());
                DOM.modalClose.addEventListener('click', () => closeArticleModal());
                DOM.modalCloseBtn.addEventListener('click', () => closeArticleModal());
                DOM.modalOverlay.addEventListener('click', (e) => {
                    if (e.target === DOM.modalOverlay) closeArticleModal();
                });
                DOM.modalBookmarkBtn.addEventListener('click', () => toggleBookmarkFromModal());
                DOM.searchInput.addEventListener('input', (e) => handleSearch(e.target.value));
                DOM.searchClear.addEventListener('click', () => clearSearch());

                // Keyboard: Escape closes modals/panels
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape') {
                        if (DOM.modalOverlay.classList.contains('open')) {
                            closeArticleModal();
                        } else if (DOM.bookmarksPanel.classList.contains('open')) {
                            closeBookmarksPanel();
                        }
                    }
                });

                // Initial load
                loadArticles(true);

                // Listen for system theme changes
                window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
                    const saved = localStorage.getItem('newsnova_theme');
                    if (!saved) {
                        State.isDarkMode = e.matches;
                        ThemeManager.apply();
                        ThemeManager.updateIcon();
                    }
                });

                console.log('🚀 NewsNova initialized successfully!');
                console.log(`   Theme: ${State.isDarkMode ? 'Dark' : 'Light'} mode`);
                console.log(`   Bookmarks: ${State.bookmarks.length} saved`);
                console.log(`   API Mode: ${CONFIG.USE_MOCK_DATA || !CONFIG.NEWS_API_KEY ? 'Mock Data (demo)' : 'Live NewsAPI'}`);
                if (!CONFIG.NEWS_API_KEY && !CONFIG.USE_MOCK_DATA) {
                    console.log('   💡 Tip: Add your NewsAPI key in CONFIG.NEWS_API_KEY for live data.');
                }
            }

            // ──────────────────────────────────────────────
            // START THE APP
            // ──────────────────────────────────────────────
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        })();
    </script>
</body>
</html>
