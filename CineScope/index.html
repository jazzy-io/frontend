<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="../jazzy_templates.png">
  <title>CineScope – Movie & TV Explorer</title>
  <!-- Font Awesome 6 (free) for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    /* ---------- CSS CUSTOM PROPERTIES (DESIGN TOKENS) ---------- */
    :root {
      --clr-bg: #0f0f1a;
      --clr-surface: #1a1a2e;
      --clr-surface-light: #25253e;
      --clr-text: #e0e0e0;
      --clr-text-muted: #9e9e9e;
      --clr-accent: #f5c518;      /* IMDB-like gold */
      --clr-accent-hover: #ffd54f;
      --clr-danger: #e53935;
      --clr-success: #4caf50;
      --font-sans: 'Segoe UI', system-ui, -apple-system, sans-serif;
      --font-heading: 'Georgia', serif;
      --radius: 0.75rem;
      --shadow-card: 0 4px 16px rgba(0, 0, 0, 0.4);
      --shadow-modal: 0 12px 40px rgba(0, 0, 0, 0.7);
      --transition: 0.2s ease;
      --max-width: 1400px;
    }

    /* ---------- RESET & BASE ---------- */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-sans);
      background: var(--clr-bg);
      color: var(--clr-text);
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    img {
      max-width: 100%;
      display: block;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button {
      cursor: pointer;
      font-family: inherit;
    }

    /* ---------- UTILITY ---------- */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      border: 0;
    }

    /* ---------- LAYOUT ---------- */
    .app-container {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 0 1rem;
      width: 100%;
    }

    /* ---------- HEADER ---------- */
    .header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 1.2rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .logo {
      font-family: var(--font-heading);
      font-size: 2rem;
      letter-spacing: -0.5px;
      color: var(--clr-accent);
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .logo i {
      font-size: 1.8rem;
    }

    .nav-links {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
    }

    .category-btn {
      background: transparent;
      border: 1px solid transparent;
      color: var(--clr-text-muted);
      padding: 0.5rem 1rem;
      border-radius: 2rem;
      font-size: 0.9rem;
      font-weight: 500;
      transition: all var(--transition);
    }

    .category-btn:hover,
    .category-btn.active {
      background: var(--clr-surface-light);
      color: var(--clr-text);
      border-color: var(--clr-accent);
      box-shadow: 0 0 8px rgba(245,197,24,0.2);
    }

    .search-wrapper {
      display: flex;
      align-items: center;
      background: var(--clr-surface);
      border-radius: 2rem;
      padding: 0.3rem 0.3rem 0.3rem 1rem;
      border: 1px solid rgba(255,255,255,0.1);
      transition: border var(--transition);
    }

    .search-wrapper:focus-within {
      border-color: var(--clr-accent);
    }

    #search-input {
      background: transparent;
      border: none;
      color: var(--clr-text);
      font-size: 0.95rem;
      width: 160px;
      outline: none;
    }

    #search-btn {
      background: var(--clr-accent);
      border: none;
      color: #0f0f1a;
      border-radius: 50%;
      width: 2rem;
      height: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      margin-left: 0.3rem;
      transition: background var(--transition);
    }

    #search-btn:hover {
      background: var(--clr-accent-hover);
    }

    .watchlist-toggle {
      background: var(--clr-surface);
      border: 1px solid rgba(255,255,255,0.15);
      color: var(--clr-text);
      padding: 0.5rem 1rem;
      border-radius: 2rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.9rem;
      transition: all var(--transition);
    }

    .watchlist-toggle:hover {
      background: var(--clr-surface-light);
      border-color: var(--clr-accent);
    }

    /* ---------- MOVIE GRID ---------- */
    .movie-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 1.5rem;
      padding: 2rem 0;
      flex: 1;
    }

    .movie-card {
      background: var(--clr-surface);
      border-radius: var(--radius);
      overflow: hidden;
      transition: transform var(--transition), box-shadow var(--transition);
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow-card);
    }

    .movie-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 28px rgba(0,0,0,0.7);
    }

    .card-poster {
      aspect-ratio: 2/3;
      background: var(--clr-surface-light);
      position: relative;
      overflow: hidden;
    }

    .card-poster img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s;
    }

    .movie-card:hover .card-poster img {
      transform: scale(1.05);
    }

    .no-poster {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--clr-text-muted);
      font-size: 2.5rem;
    }

    .card-body {
      padding: 0.8rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      flex: 1;
    }

    .card-title {
      font-weight: 600;
      font-size: 0.95rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.8rem;
      color: var(--clr-text-muted);
    }

    .rating {
      display: flex;
      align-items: center;
      gap: 0.2rem;
      color: var(--clr-accent);
    }

    .card-actions {
      display: flex;
      gap: 0.5rem;
      margin-top: auto;
    }

    .card-btn {
      background: var(--clr-surface-light);
      border: none;
      color: var(--clr-text);
      border-radius: 0.4rem;
      padding: 0.4rem 0.7rem;
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      gap: 0.2rem;
      transition: background var(--transition);
    }

    .card-btn:hover {
      background: var(--clr-accent);
      color: #0f0f1a;
    }

    .btn-watchlist.watchlisted {
      background: var(--clr-accent);
      color: #0f0f1a;
    }

    /* ---------- LOADING / ERROR ---------- */
    .loader {
      display: flex;
      justify-content: center;
      padding: 3rem;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(255,255,255,0.1);
      border-left-color: var(--clr-accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error-state {
      text-align: center;
      padding: 2rem;
      background: var(--clr-surface);
      border-radius: var(--radius);
      max-width: 400px;
      margin: 2rem auto;
    }

    .error-state i {
      font-size: 2.5rem;
      color: var(--clr-danger);
      margin-bottom: 0.8rem;
    }

    .retry-btn {
      margin-top: 1rem;
      background: var(--clr-accent);
      border: none;
      padding: 0.6rem 1.5rem;
      border-radius: 2rem;
      font-weight: 600;
      color: #0f0f1a;
    }

    /* ---------- MODAL ---------- */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(6px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 1rem;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background: var(--clr-surface);
      border-radius: var(--radius);
      max-width: 800px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
      box-shadow: var(--shadow-modal);
      animation: fadeInUp 0.3s ease;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .modal-close {
      position: absolute;
      top: 0.8rem;
      right: 0.8rem;
      background: rgba(0,0,0,0.6);
      border: none;
      color: white;
      font-size: 1.3rem;
      width: 2rem;
      height: 2rem;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      transition: background var(--transition);
    }

    .modal-close:hover {
      background: var(--clr-danger);
    }

    .trailer-container {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      background: #000;
    }

    .trailer-container iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    .modal-content {
      padding: 1.5rem;
    }

    .modal-title {
      font-family: var(--font-heading);
      font-size: 1.6rem;
      margin-bottom: 0.4rem;
    }

    .modal-meta {
      display: flex;
      gap: 1.5rem;
      color: var(--clr-text-muted);
      margin-bottom: 1rem;
    }

    .modal-overview {
      margin-bottom: 1.2rem;
      line-height: 1.6;
    }

    .similar-heading {
      font-size: 1.2rem;
      margin: 1.2rem 0 0.8rem;
    }

    .similar-grid {
      display: flex;
      gap: 0.8rem;
      overflow-x: auto;
      padding-bottom: 0.8rem;
    }

    .similar-item {
      flex: 0 0 100px;
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: transform var(--transition);
    }

    .similar-item:hover {
      transform: scale(1.05);
    }

    .similar-item img {
      aspect-ratio: 2/3;
      object-fit: cover;
    }

    /* ---------- WATCHLIST PANEL ---------- */
    .watchlist-panel {
      position: fixed;
      top: 0;
      right: 0;
      width: 320px;
      max-width: 85vw;
      height: 100vh;
      background: var(--clr-surface);
      box-shadow: -8px 0 24px rgba(0,0,0,0.5);
      z-index: 900;
      transform: translateX(100%);
      transition: transform 0.3s ease;
      display: flex;
      flex-direction: column;
      padding: 1.5rem;
    }

    .watchlist-panel.open {
      transform: translateX(0);
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }

    .panel-close {
      background: none;
      border: none;
      color: var(--clr-text);
      font-size: 1.5rem;
    }

    .watchlist-items {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }

    .watchlist-item {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      background: var(--clr-surface-light);
      border-radius: var(--radius);
      padding: 0.5rem;
    }

    .watchlist-item img {
      width: 45px;
      height: 68px;
      object-fit: cover;
      border-radius: 0.3rem;
    }

    .remove-watchlist {
      margin-left: auto;
      background: none;
      border: none;
      color: var(--clr-danger);
      font-size: 1.1rem;
    }

    /* ---------- RESPONSIVE ---------- */
    @media (max-width: 700px) {
      .header {
        flex-direction: column;
        align-items: stretch;
      }

      .search-wrapper {
        width: 100%;
      }

      #search-input {
        width: 100%;
      }

      .movie-grid {
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 1rem;
      }

      .nav-links {
        overflow-x: auto;
        flex-wrap: nowrap;
        -webkit-overflow-scrolling: touch;
      }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <!-- HEADER -->
    <header class="header">
      <div class="logo">
        <i class="fas fa-film"></i> CineScope
      </div>
      <nav class="nav-links" id="category-nav" aria-label="Category navigation">
        <button class="category-btn active" data-category="popular">Popular</button>
        <button class="category-btn" data-category="now_playing">Now Playing</button>
        <button class="category-btn" data-category="top_rated">Top Rated</button>
        <button class="category-btn" data-category="upcoming">Upcoming</button>
        <button class="category-btn" data-category="tv_popular">📺 TV Popular</button>
      </nav>
      <div class="search-wrapper">
        <label for="search-input" class="sr-only">Search movies or TV shows</label>
        <input type="text" id="search-input" placeholder="Search movies/TV...">
        <button id="search-btn" aria-label="Search"><i class="fas fa-search"></i></button>
      </div>
      <button class="watchlist-toggle" id="watchlist-toggle-btn" aria-label="Open watchlist">
        <i class="fas fa-bookmark"></i> Watchlist (<span id="watchlist-count">0</span>)
      </button>
    </header>

    <!-- MAIN CONTENT -->
    <main id="movie-grid" class="movie-grid" aria-live="polite" aria-label="Movie and TV show grid">
      <!-- dynamically populated -->
    </main>

    <!-- LOADER -->
    <div id="loader" class="loader" style="display: none;">
      <div class="spinner"></div>
    </div>

    <!-- ERROR STATE -->
    <div id="error-container" style="display: none;" class="error-state">
      <i class="fas fa-exclamation-circle"></i>
      <p id="error-message">Something went wrong.</p>
      <button class="retry-btn" id="retry-btn">Try Again</button>
    </div>

    <!-- TRAILER MODAL -->
    <div id="trailer-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal">
        <button class="modal-close" id="modal-close" aria-label="Close modal">&times;</button>
        <div class="trailer-container" id="trailer-embed"></div>
        <div class="modal-content">
          <h2 id="modal-title" class="modal-title"></h2>
          <div class="modal-meta">
            <span id="modal-year"></span>
            <span id="modal-rating" class="rating"><i class="fas fa-star"></i> <span></span></span>
          </div>
          <p class="modal-overview" id="modal-overview"></p>
          <h3 class="similar-heading">You Might Also Like</h3>
          <div id="similar-grid" class="similar-grid"></div>
        </div>
      </div>
    </div>

    <!-- WATCHLIST PANEL -->
    <aside id="watchlist-panel" class="watchlist-panel" aria-hidden="true">
      <div class="panel-header">
        <h2>My Watchlist</h2>
        <button class="panel-close" id="panel-close" aria-label="Close watchlist">&times;</button>
      </div>
      <div id="watchlist-items" class="watchlist-items"></div>
    </aside>
  </div>

  <script>
    (function() {
      'use strict';

      /* ---------- CONFIGURATION ---------- */
      const TMDB_API_KEY = '574ff98695f8c567247f02e02263bbe6'; // Replace with your v3 API key
      const BASE_URL = 'https://api.themoviedb.org/3';
      const IMG_BASE = 'https://image.tmdb.org/t/p/w500';
      const PLACEHOLDER_POSTER = 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300"%3E%3Crect fill="%2325253e" width="200" height="300"/%3E%3Ctext fill="%239e9e9e" x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" font-size="20"%3ENo Poster%3C/text%3E%3C/svg%3E';

      /* ---------- STATE ---------- */
      const state = {
        currentCategory: 'popular',
        currentPage: 1,
        totalPages: 1,
        isLoading: false,
        searchQuery: '',
        watchlist: JSON.parse(localStorage.getItem('cineScope_watchlist')) || [],
        mediaType: 'movie', // 'movie' or 'tv'
      };

      /* ---------- DOM REFS ---------- */
      const movieGrid = document.getElementById('movie-grid');
      const loader = document.getElementById('loader');
      const errorContainer = document.getElementById('error-container');
      const errorMessage = document.getElementById('error-message');
      const retryBtn = document.getElementById('retry-btn');
      const categoryNav = document.getElementById('category-nav');
      const searchInput = document.getElementById('search-input');
      const searchBtn = document.getElementById('search-btn');
      const watchlistToggleBtn = document.getElementById('watchlist-toggle-btn');
      const watchlistCount = document.getElementById('watchlist-count');
      const watchlistPanel = document.getElementById('watchlist-panel');
      const watchlistItems = document.getElementById('watchlist-items');
      const panelClose = document.getElementById('panel-close');
      const trailerModal = document.getElementById('trailer-modal');
      const modalClose = document.getElementById('modal-close');
      const trailerEmbed = document.getElementById('trailer-embed');
      const modalTitle = document.getElementById('modal-title');
      const modalYear = document.getElementById('modal-year');
      const modalRating = document.getElementById('modal-rating').querySelector('span');
      const modalOverview = document.getElementById('modal-overview');
      const similarGrid = document.getElementById('similar-grid');

      /* ---------- API SERVICE (Fetch wrapper) ---------- */
      async function fetchFromTMDB(endpoint, params = {}) {
        const url = new URL(`${BASE_URL}/${endpoint}`);
        url.searchParams.append('api_key', TMDB_API_KEY);
        Object.entries(params).forEach(([key, value]) => url.searchParams.append(key, value));
        const response = await fetch(url);
        if (!response.ok) {
          throw new Error(`HTTP error ${response.status}: ${response.statusText}`);
        }
        return await response.json();
      }

      /* ---------- HELPER: image URL ---------- */
      function getPosterUrl(path) {
        return path ? `${IMG_BASE}${path}` : PLACEHOLDER_POSTER;
      }

      /* ---------- WATCHLIST OPERATIONS ---------- */
      function saveWatchlist() {
        localStorage.setItem('cineScope_watchlist', JSON.stringify(state.watchlist));
        updateWatchlistUI();
      }

      function toggleWatchlist(item) {
        const index = state.watchlist.findIndex(w => w.id === item.id && w.mediaType === item.mediaType);
        if (index > -1) {
          state.watchlist.splice(index, 1);
        } else {
          state.watchlist.push({
            id: item.id,
            title: item.title || item.name,
            poster_path: item.poster_path,
            mediaType: item.mediaType || state.mediaType,
          });
        }
        saveWatchlist();
        renderWatchlistPanel();
      }

      function isInWatchlist(id) {
        return state.watchlist.some(w => w.id === id);
      }

      function updateWatchlistUI() {
        watchlistCount.textContent = state.watchlist.length;
      }

      /* ---------- RENDER WATCHLIST PANEL ---------- */
      function renderWatchlistPanel() {
        watchlistItems.innerHTML = '';
        if (state.watchlist.length === 0) {
          watchlistItems.innerHTML = '<p style="color: var(--clr-text-muted); text-align: center;">Your watchlist is empty.</p>';
          return;
        }
        state.watchlist.forEach(item => {
          const div = document.createElement('div');
          div.className = 'watchlist-item';
          div.innerHTML = `
            <img src="${getPosterUrl(item.poster_path)}" alt="${item.title} poster" loading="lazy">
            <span>${item.title}</span>
            <button class="remove-watchlist" data-id="${item.id}" aria-label="Remove ${item.title} from watchlist">
              <i class="fas fa-trash-alt"></i>
            </button>
          `;
          div.querySelector('.remove-watchlist').addEventListener('click', (e) => {
            e.stopPropagation();
            toggleWatchlist(item);
          });
          watchlistItems.appendChild(div);
        });
      }

      /* ---------- MOVIE CARD COMPONENT ---------- */
      function createMovieCard(item) {
        const card = document.createElement('div');
        card.className = 'movie-card';
        const title = item.title || item.name;
        const year = (item.release_date || item.first_air_date || '').substring(0, 4);
        const rating = item.vote_average ? item.vote_average.toFixed(1) : 'N/A';
        const watchlisted = isInWatchlist(item.id);
        card.innerHTML = `
          <div class="card-poster">
            <img src="${getPosterUrl(item.poster_path)}" alt="${title} poster" loading="lazy">
          </div>
          <div class="card-body">
            <div class="card-title" title="${title}">${title}</div>
            <div class="card-meta">
              <span>${year || '—'}</span>
              <span class="rating"><i class="fas fa-star"></i> ${rating}</span>
            </div>
            <div class="card-actions">
              <button class="card-btn trailer-btn" data-id="${item.id}" aria-label="Watch trailer of ${title}">
                <i class="fas fa-play"></i> Trailer
              </button>
              <button class="card-btn btn-watchlist ${watchlisted ? 'watchlisted' : ''}" data-id="${item.id}" aria-label="${watchlisted ? 'Remove from' : 'Add to'} watchlist">
                <i class="fas ${watchlisted ? 'fa-check' : 'fa-plus'}"></i>
              </button>
            </div>
          </div>
        `;
        // Event listeners
        card.querySelector('.trailer-btn').addEventListener('click', () => openTrailerModal(item.id));
        card.querySelector('.btn-watchlist').addEventListener('click', (e) => {
          e.stopPropagation();
          toggleWatchlist(item);
          // Refresh this card's watchlist button state without full re-render
          const btn = e.currentTarget;
          const isNowWatchlisted = isInWatchlist(item.id);
          btn.classList.toggle('watchlisted', isNowWatchlisted);
          btn.querySelector('i').className = isNowWatchlisted ? 'fas fa-check' : 'fas fa-plus';
        });
        return card;
      }

      /* ---------- RENDER MOVIE GRID ---------- */
      function renderMovies(movies, append = false) {
        if (!append) {
          movieGrid.innerHTML = '';
        }
        movies.forEach(movie => {
          movieGrid.appendChild(createMovieCard(movie));
        });
      }

      /* ---------- INFINITE SCROLL LOGIC ---------- */
      function handleScroll() {
        if (state.isLoading || state.searchQuery) return; // no infinite scroll during search
        const { scrollTop, clientHeight, scrollHeight } = document.documentElement;
        if (scrollTop + clientHeight >= scrollHeight - 600 && state.currentPage < state.totalPages) {
          loadMovies(state.currentPage + 1, true);
        }
      }

      /* ---------- LOAD MOVIES (FETCH & DISPLAY) ---------- */
      async function loadMovies(page = 1, append = false) {
        if (state.isLoading) return;
        state.isLoading = true;
        showLoading(true);
        hideError();
        try {
          let data;
          if (state.searchQuery) {
            const searchType = state.mediaType === 'tv' ? 'tv' : 'movie';
            data = await fetchFromTMDB(`search/${searchType}`, {
              query: state.searchQuery,
              page,
            });
          } else {
            let endpoint;
            if (state.currentCategory === 'tv_popular') {
              endpoint = 'tv/popular';
              state.mediaType = 'tv';
            } else {
              endpoint = `movie/${state.currentCategory}`;
              state.mediaType = 'movie';
            }
            data = await fetchFromTMDB(endpoint, { page });
          }
          const results = data.results || [];
          state.currentPage = data.page;
          state.totalPages = data.total_pages;
          renderMovies(results, append);
        } catch (error) {
          console.error('Fetch error:', error);
          showError('Failed to load movies. Please check your API key or network connection.');
        } finally {
          state.isLoading = false;
          showLoading(false);
        }
      }

      /* ---------- LOADING / ERROR UI ---------- */
      function showLoading(show) {
        loader.style.display = show ? 'flex' : 'none';
      }

      function showError(message) {
        errorMessage.textContent = message;
        errorContainer.style.display = 'block';
      }

      function hideError() {
        errorContainer.style.display = 'none';
      }

      /* ---------- TRAILER MODAL ---------- */
      async function openTrailerModal(id) {
        try {
          showLoading(true);
          const mediaType = state.mediaType;
          // Fetch details
          const details = await fetchFromTMDB(`${mediaType}/${id}`);
          // Fetch videos
          const videosData = await fetchFromTMDB(`${mediaType}/${id}/videos`);
          const trailer = videosData.results.find(v => v.type === 'Trailer' && v.site === 'YouTube') || videosData.results[0];
          // Fetch similar/recommendations
          const similarData = await fetchFromTMDB(`${mediaType}/${id}/similar`, { page: 1 });
          // Populate modal
          modalTitle.textContent = details.title || details.name;
          modalYear.textContent = (details.release_date || details.first_air_date || '').substring(0, 4);
          modalRating.textContent = details.vote_average ? details.vote_average.toFixed(1) : 'N/A';
          modalOverview.textContent = details.overview || 'No overview available.';
          // Trailer iframe
          trailerEmbed.innerHTML = trailer
            ? `<iframe src="https://www.youtube.com/embed/${trailer.key}?autoplay=1&rel=0" allowfullscreen allow="autoplay"></iframe>`
            : `<div style="display:flex;align-items:center;justify-content:center;height:100%;background:#000;"><p>No trailer available</p></div>`;
          // Similar movies
          similarGrid.innerHTML = '';
          (similarData.results || []).slice(0, 10).forEach(item => {
            const simDiv = document.createElement('div');
            simDiv.className = 'similar-item';
            simDiv.innerHTML = `<img src="${getPosterUrl(item.poster_path)}" alt="${item.title || item.name}" loading="lazy">`;
            simDiv.addEventListener('click', () => {
              closeModal();
              openTrailerModal(item.id);
            });
            similarGrid.appendChild(simDiv);
          });
          // Show modal
          trailerModal.classList.add('active');
          document.body.style.overflow = 'hidden';
        } catch (error) {
          console.error(error);
          showError('Could not load trailer details.');
        } finally {
          showLoading(false);
        }
      }

      function closeModal() {
        trailerModal.classList.remove('active');
        document.body.style.overflow = '';
        trailerEmbed.innerHTML = ''; // stop video
      }

      /* ---------- CATEGORY CHANGE ---------- */
      function setActiveCategory(category) {
        state.currentCategory = category;
        state.searchQuery = '';
        searchInput.value = '';
        state.currentPage = 1;
        document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
        const activeBtn = document.querySelector(`[data-category="${category}"]`);
        if (activeBtn) activeBtn.classList.add('active');
        loadMovies(1, false);
      }

      /* ---------- SEARCH ---------- */
      function performSearch() {
        const query = searchInput.value.trim();
        if (query === state.searchQuery) return;
        state.searchQuery = query;
        state.currentPage = 1;
        // Deactivate category buttons visually
        document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
        loadMovies(1, false);
      }

      /* ---------- EVENT LISTENERS ---------- */
      categoryNav.addEventListener('click', (e) => {
        const btn = e.target.closest('.category-btn');
        if (!btn) return;
        setActiveCategory(btn.dataset.category);
      });

      searchBtn.addEventListener('click', performSearch);
      searchInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') performSearch();
      });

      retryBtn.addEventListener('click', () => {
        hideError();
        loadMovies(state.currentPage, false);
      });

      window.addEventListener('scroll', handleScroll, { passive: true });

      // Watchlist panel
      watchlistToggleBtn.addEventListener('click', () => {
        watchlistPanel.classList.add('open');
        watchlistPanel.setAttribute('aria-hidden', 'false');
        renderWatchlistPanel();
      });

      panelClose.addEventListener('click', () => {
        watchlistPanel.classList.remove('open');
        watchlistPanel.setAttribute('aria-hidden', 'true');
      });

      // Modal close
      modalClose.addEventListener('click', closeModal);
      trailerModal.addEventListener('click', (e) => {
        if (e.target === trailerModal) closeModal();
      });
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && trailerModal.classList.contains('active')) {
          closeModal();
        }
      });

      // Close watchlist panel on Escape
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && watchlistPanel.classList.contains('open')) {
          panelClose.click();
        }
      });

      /* ---------- INITIAL LOAD ---------- */
      updateWatchlistUI();
      loadMovies(1);
    })();
  </script>
</body>
</html>
