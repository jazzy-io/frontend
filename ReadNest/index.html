                            favBtnElement.classList.remove('book-card__fav-btn--active');
                            favBtnElement.innerHTML = '🤍';
                            favBtnElement.setAttribute('aria-label', 'Add to favorites');
                        }
                        this.showToast('Removed from favorites');
                    } else {
                        Store.addFavorite(book);
                        if (favBtnElement) {
                            favBtnElement.classList.add('book-card__fav-btn--active');
                            favBtnElement.innerHTML = '❤️';
                            favBtnElement.setAttribute('aria-label', 'Remove from favorites');
                        }
                        this.showToast('Added to favorites! ❤️');
                    }
                    this.updateFavBadge();
                    UI.renderFavoritesDrawer();
                },

                refreshBookCardsFavState() {
                    const cards = $$('.book-card');
                    cards.forEach(card => {
                        const key = card.dataset.bookKey;
                        const favBtn = $('[data-action="toggle-fav"]', card);
                        if (favBtn && key) {
                            const isFav = Store.isFavorite(key);
                            favBtn.classList.toggle('book-card__fav-btn--active', isFav);
                            favBtn.innerHTML = isFav ? '❤️' : '🤍';
                            favBtn.setAttribute('aria-label', isFav ? 'Remove from favorites' :
                                'Add to favorites');
                        }
                    });
                    // Also update modal if open
                    const modalFavBtn = $('#modalFavBtn');
                    const selectedBook = Store.getState().selectedBook;
                    if (modalFavBtn && selectedBook) {
                        const isFav = Store.isFavorite(selectedBook.key);
                        modalFavBtn.classList.toggle('modal__fav-btn--active', isFav);
                        modalFavBtn.innerHTML = isFav ? '❤️ Saved' : '🤍 Add to Favorites';
                        modalFavBtn.setAttribute('aria-label', isFav ? 'Remove from favorites' :
                            'Add to favorites');
                    }
                },

                updateFavBadge() {
                    const badge = $('#favBadge');
                    if (!badge) return;
                    const count = Store.getFavoriteCount();
                    badge.textContent = count > 0 ? count : '';
                    if (count > 0) {
                        badge.classList.add('pulse');
                        setTimeout(() => badge.classList.remove('pulse'), 400);
                    }
                },

                showToast(message, isError = false) {
                    const container = $('#toastContainer');
                    if (!container) return;
                    const toast = document.createElement('div');
                    toast.className = 'toast' + (isError ? '' : ' toast--success');
                    toast.textContent = message;
                    toast.setAttribute('role', 'status');
                    container.appendChild(toast);

                    setTimeout(() => {
                        toast.classList.add('toast--removing');
                        toast.addEventListener('animationend', () => {
                            toast.remove();
                        }, { once: true });
                    }, 2500);
                },

                _setupSearchListeners() {
                    const searchInput = $('#searchInput');
                    const searchBtn = $('#searchBtn');

                    const performSearch = () => {
                        const query = searchInput.value.trim();
                        Store.update({
                            searchQuery: query,
                            currentPage: 1,
                            books: [],
                            selectedGenre: 'all',
                            currentView: 'catalog',
                        });
                        UI.renderGenreFilters('all');
                        App.loadBooks();
                    };

                    const debouncedSearch = debounce(performSearch, 500);

                    searchInput.addEventListener('input', () => {
                        const query = searchInput.value.trim();
                        if (query.length >= 2) {
                            debouncedSearch();
                        } else if (query.length === 0) {
                            // Reset to catalog
                            Store.update({
                                searchQuery: '',
                                currentPage: 1,
                                books: [],
                                selectedGenre: 'all',
                                currentView: 'catalog',
                            });
                            UI.renderGenreFilters('all');
                            App.loadBooks();
                        }
                    });

                    searchInput.addEventListener('keydown', (e) => {
                        if (e.key === 'Enter') {
                            performSearch();
                        }
                    });

                    searchBtn.addEventListener('click', performSearch);
                },

                _setupModalListeners() {
                    const overlay = $('#modalOverlay');
                    const closeBtn = $('#modalClose');

                    closeBtn.addEventListener('click', () => this.closeModal());
                    overlay.addEventListener('click', (e) => {
                        if (e.target === overlay) {
                            this.closeModal();
                        }
                    });
                    document.addEventListener('keydown', (e) => {
                        if (e.key === 'Escape' && overlay.classList.contains(
                                'modal-overlay--open')) {
                            this.closeModal();
                        }
                    });
                },

                _setupDrawerListeners() {
                    const drawer = $('#drawer');
                    const overlay = $('#drawerOverlay');
                    const trigger = $('#favDrawerTrigger');
                    const closeBtn = $('#drawerClose');

                    const openDrawer = () => {
                        UI.renderFavoritesDrawer();
                        drawer.classList.add('drawer--open');
                        overlay.classList.add('drawer-overlay--open');
                        drawer.setAttribute('aria-hidden', 'false');
                        overlay.setAttribute('aria-hidden', 'false');
                        document.body.style.overflow = 'hidden';
                        closeBtn?.focus();
                    };

                    const closeDrawer = () => {
                        drawer.classList.remove('drawer--open');
                        overlay.classList.remove('drawer-overlay--open');
                        drawer.setAttribute('aria-hidden', 'true');
                        overlay.setAttribute('aria-hidden', 'true');
                        document.body.style.overflow = '';
                    };

                    trigger.addEventListener('click', openDrawer);
                    closeBtn.addEventListener('click', closeDrawer);
                    overlay.addEventListener('click', (e) => {
                        if (e.target === overlay) closeDrawer();
                    });
                    document.addEventListener('keydown', (e) => {
                        if (e.key === 'Escape' && drawer.classList.contains('drawer--open')) {
                            closeDrawer();
                        }
                    });
                },

                _setupLoadMoreListener() {
                    const btn = $('#loadMoreBtn');
                    if (!btn) return;
                    btn.addEventListener('click', () => {
                        const state = Store.getState();
                        Store.update({ currentPage: state.currentPage + 1 });
                        this.loadBooks();
                    });
                },

                _setupNavListeners() {
                    const navBtns = $$('.header__nav-btn[data-view]');
                    navBtns.forEach(btn => {
                        btn.addEventListener('click', () => {
                            const view = btn.dataset.view;
                            // Update active states
                            navBtns.forEach(b => {
                                b.classList.remove('header__nav-btn--active');
                                b.setAttribute('aria-pressed', 'false');
                            });
                            btn.classList.add('header__nav-btn--active');
                            btn.setAttribute('aria-pressed', 'true');

                            // Update state and reload
                            Store.update({
                                currentView: view,
                                currentPage: 1,
                                books: [],
                                searchQuery: '',
                                selectedGenre: 'all',
                            });
                            $('#searchInput').value = '';
                            UI.renderGenreFilters('all');
                            this.loadBooks();
                        });
                    });
                },

                _setupHeaderScrollListener() {
                    const header = $('#header');
                    let ticking = false;
                    window.addEventListener('scroll', () => {
                        if (!ticking) {
                            requestAnimationFrame(() => {
                                if (window.scrollY > 10) {
                                    header.classList.add('scrolled');
                                } else {
                                    header.classList.remove('scrolled');
                                }
                                ticking = false;
                            });
                            ticking = true;
                        }
                    }, { passive: true });
                },
            };

            // ============ INITIALIZE APPLICATION ============
            document.addEventListener('DOMContentLoaded', () => {
                App.init();
            });

            // ============ EXPORT FOR DEBUGGING (Development only) ============
            if (typeof window !== 'undefined') {
                window.__ReadNest = { Store, APIService, UI, App };
            }
        })();
    </script>
</body>
</html>
